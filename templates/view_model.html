{% extends "base.html" %}

{% block title %}Ver Modelo - SimpleERP{% endblock %}

{% block breadcrumb %}
<span class="text-slate-400">/</span>
<a href="/" class="text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">Inicio</a>
<span class="text-slate-400">/</span>
<a href="/models" class="text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">Modelos</a>
<span class="text-slate-400">/</span>
<span class="text-slate-700 dark:text-slate-200 font-medium">Ver</span>
{% endblock %}

{% block content %}

<div class="flex items-center justify-between">
    <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Modelo: {{model.name}}</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">{{model.filepath}}</p>
    </div>
    <a href="/models" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">Back</a>
</div>

<br>


<div class="max-w-2xl mx-auto">
    <div class="mb-6" id="viewer"></div>
    


</div>


<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
      }
    }
    </script>
  
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { STLLoader } from 'three/addons/loaders/STLLoader.js';
  
      const container = document.getElementById('viewer');
      
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x9c9c9c);
      
      const camera = new THREE.PerspectiveCamera(20, 500/500, 1, 1000);
      camera.position.set(200, 400,400);
      
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize( 500,500 );
      container.appendChild(renderer.domElement);
      
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
  
      const light1 = new THREE.DirectionalLight(0xffffff, 1);
      light1.position.set(1, 1, 1).normalize();
      scene.add(light1);
      scene.add(new THREE.AmbientLight(0x404040, 0.4));
         
      
      const modelUrl = "/{{model.filepath | safe}}";  // o ruta absoluta completa
      
      const loader = new STLLoader();
      loader.load(modelUrl, 
        function(geometry) {
          console.log("Geometry:", geometry);
          
          geometry.computeVertexNormals();
          
          const material = new THREE.MeshPhongMaterial({ 
            color: 0xdebe42, 
            specular: 0x0, 
            shininess: 100 
          });
          
          const mesh = new THREE.Mesh(geometry, material);

          geometry.center()
          
          
          scene.add(mesh);
        }
      );
      function resizeRenderer() {
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height);
        camera.aspect = rect.width / rect.height;
        camera.updateProjectionMatrix();
        }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
      
      window.addEventListener('resize', resizeRenderer);
    </script>

{% endblock %}
